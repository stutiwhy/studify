server.port=8081

# ==============================
# 🗄️ Local MySQL Configuration
# ==============================
# Change 'sms_db' to your actual database name
spring.datasource.url=jdbc:mysql://${TIDB_HOST}:${TIDB_PORT}/${TIDB_DB_NAME}?useSSL=true&verifyServerCertificate=true
spring.datasource.username=${TIDB_USER}
spring.datasource.password=${TIDB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# ⚙️ JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Updated dialect for MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect