server.port=8081

# ==============================
# 🗄️ Local MySQL Configuration
# ==============================
# Change 'sms_db' to your actual database name
spring.datasource.url=jdbc:${TIDB_URL}

# ==============================
# ⚙️ JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Updated dialect for MySQL 8+
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect